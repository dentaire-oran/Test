<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine? 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.8);
            --yes-green: #4ade80;
            --no-red: #fb7185;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        .hearts-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 10;
            max-width: 90%;
            width: 450px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 2rem;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 120px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        #yesBtn { background: var(--yes-green); color: white; z-index: 20; }
        
        #noBtn { 
            background: var(--no-red); 
            color: white; 
            position: absolute; 
            z-index: 21; 
            /* Smooth transition for the dodge */
            transition: left 0.3s ease, top 0.3s ease, transform 0.2s ease;
        }

        #successScreen, #catScreen {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 800px;
            margin-top: 2rem;
        }

        .gallery img {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        #catImg {
            max-width: 300px;
            border-radius: 20px;
            border: 8px solid #333;
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsBg"></div>

    <div id="mainScreen" class="card">
        <h1 id="questionText">Will you be my valentine? 🌹</h1>
        <div class="buttons" id="btnContainer">
            <button id="yesBtn">Yes!</button>
            <div style="width: 100px; height: 50px;"></div> 
        </div>
    </div>
    
    <button id="noBtn">No</button>

    <div id="successScreen">
        <h1 style="color: white;">Good girl ❤️</h1>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1518192161663-5a423329cc11?w=400&q=80" alt="Us 1">
            <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?w=400&q=80" alt="Us 2">
            <img src="https://images.unsplash.com/photo-1606253416739-16a70e1b2123?w=400&q=80" alt="Us 3">
            <img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=400&q=80" alt="Us 4">
        </div>
    </div>

    <div id="catScreen">
        <h1 style="color: #ff0000; font-size: 2.5rem; text-transform: uppercase;">Stop messing with me! 😾</h1>
        <img id="catImg" src="https://i.imgflip.com/4t0m5.jpg" alt="Angry Cat">
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainScreen = document.getElementById('mainScreen');
        const successScreen = document.getElementById('successScreen');
        const catScreen = document.getElementById('catScreen');
        const questionText = document.getElementById('questionText');
        
        let clickCount = 0; 
        const messages = ["No", "Are you sure?", "Really?", "Think again!", "Last chance!", "Grrr..."];

        // Put "No" button in its initial spot next to "Yes"
        function resetNoBtnPosition() {
            const yesRect = yesBtn.getBoundingClientRect();
            noBtn.style.position = 'absolute';
            noBtn.style.left = (yesRect.right + 20) + 'px';
            noBtn.style.top = yesRect.top + 'px';
        }
        window.onload = resetNoBtnPosition;
        window.onresize = resetNoBtnPosition;

        // Background hearts
        setInterval(() => {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '110vh';
            heart.style.fontSize = (Math.random() * 15 + 10) + 'px';
            heart.style.opacity = Math.random();
            heart.style.transition = 'all 4s linear';
            document.getElementById('heartsBg').appendChild(heart);
            setTimeout(() => { heart.style.top = '-10vh'; }, 50);
            setTimeout(() => heart.remove(), 4000);
        }, 500);

        function isMobile() { return window.innerWidth <= 768; }

        // PC Hover logic
        noBtn.addEventListener('mouseover', () => {
            if (isMobile()) return;
            
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            
            noBtn.style.left = Math.max(padding, Math.random() * maxX) + 'px';
            noBtn.style.top = Math.max(padding, Math.random() * maxY) + 'px';
        });

        // Mobile click logic
        noBtn.addEventListener('click', (e) => {
            if (!isMobile()) return; 
            
            clickCount++;
            
            if (clickCount >= 6) {
                mainScreen.style.display = 'none';
                noBtn.style.display = 'none';
                catScreen.style.display = 'flex';
                document.body.style.background = "#000";
            } else {
                noBtn.innerText = messages[clickCount] || "No";
                yesBtn.style.transform = `scale(${1 + clickCount * 0.25})`;
                noBtn.style.transform = `scale(${1 - clickCount * 0.1})`;
            }
        });

        // Yes Button
        yesBtn.addEventListener('click', () => {
            mainScreen.style.display = 'none';
            noBtn.style.display = 'none';
            successScreen.style.display = 'flex';
            document.body.style.background = "linear-gradient(135deg, #ff4d6d 0%, #ff758f 100%)";
        });
    </script>
</body>
</html>
