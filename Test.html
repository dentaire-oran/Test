<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine? 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758f;
            --bg-light: #fff0f3;
            --glass: rgba(255, 255, 255, 0.8);
            --yes-green: #4ade80;
            --no-red: #fb7185;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Floating Hearts Animation Background */
        .hearts-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* Container Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
            z-index: 10;
            max-width: 90%;
            width: 450px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 120px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background: var(--yes-green);
            color: white;
            z-index: 20;
        }

        #noBtn {
            background: var(--no-red);
            color: white;
            position: relative;
            z-index: 21;
        }

        /* Success & Cat Screens */
        #successScreen, #catScreen {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-top: 2rem;
        }

        .gallery img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: rotate(var(--r));
        }

        #catImg {
            max-width: 300px;
            border-radius: 20px;
            border: 8px solid #333;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsBg"></div>

    <div id="mainScreen" class="card">
        <h1>Will you be my valentine? 🌹</h1>
        <div class="buttons">
            <button id="yesBtn">Yes!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div id="successScreen">
        <h1 style="color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.2);">Good girl ❤️</h1>
        <div class="gallery">
            <img src="us1.jpeg" onerror="this.src='https://via.placeholder.com/150/ff4d6d/ffffff?text=Us+1'" style="--r: -3deg">
            <img src="us2.jpeg" onerror="this.src='https://via.placeholder.com/150/ff4d6d/ffffff?text=Us+2'" style="--r: 2deg">
            <img src="us3.jpeg" onerror="this.src='https://via.placeholder.com/150/ff4d6d/ffffff?text=Us+3'" style="--r: -1deg">
            <img src="us4.jpeg" onerror="this.src='https://via.placeholder.com/150/ff4d6d/ffffff?text=Us+4'" style="--r: 4deg">
            <img src="us5.jpeg" onerror="this.src='https://via.placeholder.com/150/ff4d6d/ffffff?text=Us+5'" style="--r: -2deg">
        </div>
    </div>

    <div id="catScreen">
        <h1 style="color: #ff0000; font-family: sans-serif; font-size: 2.5rem; text-transform: uppercase;">Stop messing with me! 😾</h1>
        <img id="catImg" src="cat.png" alt="Angry Cat">
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainScreen = document.getElementById('mainScreen');
        const successScreen = document.getElementById('successScreen');
        const catScreen = document.getElementById('catScreen');
        const heartsBg = document.getElementById('heartsBg');
        
        let timerId = null;
        let mobileClickCount = 0; 

        // Create background floating hearts
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '110vh';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.opacity = Math.random();
            heart.style.transition = `transform ${Math.random() * 3 + 2}s linear, top ${Math.random() * 3 + 2}s linear`;
            heartsBg.appendChild(heart);

            setTimeout(() => {
                heart.style.top = '-10vh';
                heart.style.transform = `translateX(${(Math.random() - 0.5) * 100}px)`;
            }, 100);

            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);

        function isMobile() { return window.innerWidth <= 768; }

        function handleInteraction(e) {
            if (isMobile()) {
                if (e.type === 'mouseenter') return;
                e.preventDefault(); 
                mobileClickCount++;
                if (mobileClickCount >= 4) {
                    showCat();
                } else {
                    yesBtn.style.transform = `scale(${1 + mobileClickCount * 0.4})`;
                    noBtn.style.transform = `scale(${1 - mobileClickCount * 0.2})`;
                }
            } else {
                moveButtonSmoothly();
            }
        }

        function moveButtonSmoothly() {
            if (!timerId) timerId = setTimeout(showCat, 12000);

            if (noBtn.style.position !== 'fixed') {
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.position = 'fixed';
                noBtn.style.left = rect.left + 'px';
                noBtn.style.top = rect.top + 'px';
            }

            const padding = 50;
            const newX = Math.random() * (window.innerWidth - noBtn.offsetWidth - padding * 2) + padding;
            const newY = Math.random() * (window.innerHeight - noBtn.offsetHeight - padding * 2) + padding;

            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        }

        noBtn.addEventListener('mouseenter', handleInteraction);
        noBtn.addEventListener('touchstart', handleInteraction);

        yesBtn.addEventListener('click', () => {
            clearTimeout(timerId);
            mainScreen.style.display = 'none';
            successScreen.style.display = 'flex';
            document.body.style.background = "linear-gradient(135deg, #ff4d6d 0%, #ff758f 100%)";
        });

        function showCat() {
            if (successScreen.style.display !== 'flex') {
                mainScreen.style.display = 'none';
                catScreen.style.display = 'flex';
                document.body.style.background = "#000";
                setTimeout(resetGame, 4000);
            }
        }

        function resetGame() {
            catScreen.style.display = 'none';
            mainScreen.style.display = 'block';
            document.body.style.background = "linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%)";
            mobileClickCount = 0;
            clearTimeout(timerId);
            timerId = null;
            noBtn.style.position = 'relative';
            noBtn.style.left = 'auto';
            noBtn.style.top = 'auto';
            noBtn.style.transform = 'scale(1)';
            yesBtn.style.transform = 'scale(1)';
        }
    </script>
</body>
</html>
