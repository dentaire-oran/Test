<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Little Surprise ✨</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #fff5f7;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling when the button moves */
        }

        /* Soft background glow */
        .bg-glow {
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #ffcad4 0%, #fff5f7 70%);
            z-index: 0;
        }

        .card {
            background: white;
            padding: 40px 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            text-align: center;
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 800;
        }

        p {
            color: #774950;
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 16px 40px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            max-width: 240px;
            transition: transform 0.2s ease-out;
        }

        #yesBtn {
            background: #ff4d6d;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            z-index: 20;
        }

        #noBtn {
            background: #ffe5ec;
            color: #ff4d6d;
            border: 2px solid #ffb3c1;
            position: relative;
            z-index: 1000;
        }

        /* Success & Objection Pages */
        .page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 2000;
        }

        #success { background: #fff5f7; }
        #objection { background: #2b1b3d; color: white; }

        .emoji { font-size: 70px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card" id="mainCard">
        <div style="font-size: 50px; margin-bottom: 10px;">💝</div>
        <h1>I have a question...</h1>
        <p>I’ve been thinking about this for a while. Will you be my Valentine? ✨</p>
        
        <div class="btn-group">
            <button class="btn" id="yesBtn">Yes, I'd love to! 🥰</button>
            <button class="btn" id="noBtn">No, I'm mean 😈</button>
        </div>
    </div>

    <div class="page" id="success">
        <div class="emoji">💖</div>
        <h1 style="font-size: 2.5rem; color: #ff4d6d;">I KNEW IT!</h1>
        <p style="color: #774950;">You just made my day. <br> Can't wait for Feb 14th!</p>
    </div>

    <div class="page" id="objection">
        <div class="emoji">🤨</div>
        <h1>HEY! NO CHEATING!</h1>
        <p style="margin-top: 15px; opacity: 0.8;">You actually managed to catch that? <br> You definitely used some kind of hack. <br> Try again and be nice this time! ❤️</p>
        <button class="btn" style="margin-top: 30px; background: #ff4d6d; color: white;" onclick="location.reload()">Try Again 😉</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainCard = document.getElementById('mainCard');
        
        let attempts = 0;
        const maxAttempts = 8; // After 8 tries, she can actually click it

        // Combined Repulsion and Boundary Logic
        function handleMove(e) {
            if (attempts >= maxAttempts) return;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const rect = noBtn.getBoundingClientRect();
            const btnCenterX = rect.left + rect.width / 2;
            const btnCenterY = rect.top + rect.height / 2;

            const distance = Math.hypot(clientX - btnCenterX, clientY - btnCenterY);
            const radius = 100; // Activation distance

            if (distance < radius) {
                attempts++;
                
                // Calculate new position
                const padding = 20;
                const maxX = window.innerWidth - rect.width - padding;
                const maxY = window.innerHeight - rect.height - padding;

                // Move to a random spot that is definitely on-screen
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;

                noBtn.style.position = 'fixed';
                noBtn.style.left = '0';
                noBtn.style.top = '0';
                noBtn.style.transform = `translate(${newX}px, ${newY}px)`;
                
                // Make "Yes" button slightly bigger to be more tempting
                const currentScale = 1 + (attempts * 0.05);
                yesBtn.style.transform = `scale(${currentScale})`;
            }
        }

        // Listen for mouse on PC and touch on Mobile
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchstart', handleMove);

        // Click handlers
        noBtn.addEventListener('click', () => {
            if (attempts >= maxAttempts) {
                mainCard.style.display = 'none';
                document.getElementById('objection').style.display = 'flex';
            }
        });

        yesBtn.addEventListener('click', () => {
            mainCard.style.display = 'none';
            noBtn.style.display = 'none';
            document.getElementById('success').style.display = 'flex';
        });
    </script>
</body>
</html>
