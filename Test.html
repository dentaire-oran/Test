<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Little Surprise ✨</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #fff5f7;
            background-image: radial-gradient(#ffcad4 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.3);
            border: 2px solid #ffffff;
            position: relative;
            z-index: 10;
        }

        .img-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.6rem;
            margin-bottom: 10px;
            font-weight: 800;
        }

        p {
            color: #774950;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            min-height: 120px; /* Space for the button to move */
        }

        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 220px;
        }

        #yesBtn {
            background: #ff4d6d;
            color: white;
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
            z-index: 20;
        }

        #noBtn {
            background: #ffe5ec;
            color: #ff4d6d;
            border: 2px solid #ffb3c1;
            transition: all 0.2s ease;
        }

        /* Success Screen */
        #celebration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff5f7;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div class="img-container">💝</div>
        <h1 id="title">Wait, I have a question...</h1>
        <p id="desc">I've been thinking about this for a bit. Will you be my Valentine?</p>
        
        <div class="btn-group">
            <button class="btn" id="yesBtn">Yes, I'd love to! 🥰</button>
            <button class="btn" id="noBtn">Nah, I'm boring 🙄</button>
        </div>
    </div>

    <div id="celebration">
        <div style="font-size: 60px; margin-bottom: 20px;">🎉</div>
        <h1 style="font-size: 2.5rem;">YAY! ❤️</h1>
        <p style="font-size: 1.2rem;">I honestly wasn't sure you'd say yes.<br>See you on the 14th!</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainCard = document.getElementById('mainCard');
        const title = document.getElementById('title');
        const desc = document.getElementById('desc');

        const moves = [
            "Nice try! 😉",
            "Are you sure? 🤨",
            "Think again! ✨",
            "Missed me! 💃",
            "You're too slow! 🏃‍♀️",
            "Nope! 😋"
        ];
        let moveIdx = 0;

        function moveNoButton() {
            // Keep the button inside the visible area of the card container
            const container = document.querySelector('.btn-group');
            const rect = container.getBoundingClientRect();
            
            // Generate a random position within the container bounds
            const x = Math.random() * (rect.width - noBtn.offsetWidth);
            const y = Math.max(-50, Math.random() * (rect.height + 50)); 

            noBtn.style.position = 'absolute';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
            
            // Change the text to something funny
            noBtn.innerText = moves[moveIdx];
            moveIdx = (moveIdx + 1) % moves.length;

            // Make the Yes button slightly bigger every time she misses
            const currentScale = parseFloat(yesBtn.style.transform.replace('scale(', '')) || 1;
            yesBtn.style.transform = `scale(${currentScale + 0.05})`;
        }

        // PC: Hover
        noBtn.addEventListener('mouseover', moveNoButton);

        // Mobile: Touch (Teleports before they can click)
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNoButton();
        });

        // The real click event for No (just in case they are super fast)
        noBtn.addEventListener('click', () => {
            alert("Wow, you caught it! But the answer is still Yes. 😜");
        });

        yesBtn.addEventListener('click', () => {
            mainCard.style.display = 'none';
            document.getElementById('celebration').style.display = 'flex';
        });
    </script>
</body>
</html>
