<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Priority Transmission ✨</title>
    <style>
        :root {
            --accent: #ff4d6d;
            --secondary: #ffb3c1;
            --bg: #fff0f3;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #444;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* The Grid you liked, but in romantic colors */
        .grid {
            position: absolute;
            width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(255, 77, 109, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 77, 109, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: move 10s linear infinite;
            z-index: 0;
            top: -50%;
        }

        @keyframes move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .terminal {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--accent);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 77, 109, 0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        .header {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 800;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 35px;
            color: #333;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            height: 120px; /* Extra room for movement */
            align-items: center;
            position: relative;
        }

        .btn {
            padding: 14px 28px;
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s;
            font-weight: 800;
            border-radius: 8px;
            white-space: nowrap;
        }

        #yesBtn {
            background: var(--accent);
            color: white;
            z-index: 10;
        }

        #noBtn {
            border-color: #ccc;
            color: #999;
            z-index: 100;
            /* Smooth sliding for mobile/pc */
            transition: transform 0.2s ease-out; 
        }

        /* Success & Objection Pages */
        .full-page {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            text-align: center;
            padding: 20px;
        }

        #success { background: white; color: var(--accent); }
        #objection { background: #1a1a1a; color: white; }

        .emoji { font-size: 80px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="grid"></div>

    <div class="terminal" id="main-ui">
        <div class="header">Incoming Request // ID: 214</div>
        <h1>Will you be my Valentine for the upcoming cycle?</h1>
        <div class="btn-container">
            <button class="btn" id="yesBtn">Authorize ❤️</button>
            <button class="btn" id="noBtn">Decline 😈</button>
        </div>
    </div>

    <div class="full-page" id="success">
        <div class="emoji">🥰</div>
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">I KNEW IT!</h1>
        <p style="font-size: 1.2rem; color: #666;">Best decision ever. See you on the 14th!</p>
    </div>

    <div class="full-page" id="objection">
        <div class="emoji">🤨</div>
        <h1 style="color: var(--accent);">CHEATER!</h1>
        <p style="margin-top: 20px; opacity: 0.8;">You actually caught the button? You definitely cheated. <br> Try again and be nice this time! 🙄</p>
        <button class="btn" style="margin-top: 30px; border-color: var(--accent); color: var(--accent);" onclick="location.reload()">Reset Protocol</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const mainUi = document.getElementById('main-ui');
        const successPage = document.getElementById('success');
        const objectionPage = document.getElementById('objection');

        let attempts = 0;
        const maxAttempts = 8; // Becomes clickable after 8 escapes

        const escape = (e) => {
            // If she's tried enough, let her click it
            if (attempts >= maxAttempts) {
                noBtn.style.transition = 'none'; // Stop moving
                return;
            }

            attempts++;

            // Get random positions within the viewport
            const padding = 50;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const x = Math.max(padding, Math.random() * maxX);
            const y = Math.max(padding, Math.random() * maxY);

            // Calculate movement relative to current position
            const rect = noBtn.getBoundingClientRect();
            const moveX = x - rect.left;
            const moveY = y - rect.top;

            noBtn.style.transform = `translate(${moveX}px, ${moveY}px)`;

            // Make "Yes" grow slightly as she misses
            const currentScale = 1 + (attempts * 0.05);
            yesBtn.style.transform = `scale(${currentScale})`;
        };

        // PC: Hover escape
        noBtn.addEventListener('mouseover', escape);

        // Mobile: Smooth slide on touch
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Stop actual click
            escape();
        });

        // Click Logic
        noBtn.addEventListener('click', () => {
            if (attempts >= maxAttempts) {
                mainUi.style.display = 'none';
                objectionPage.style.display = 'flex';
            }
        });

        yesBtn.addEventListener('click', () => {
            mainUi.style.display = 'none';
            noBtn.style.display = 'none';
            successPage.style.display = 'flex';
        });
    </script>
</body>
</html>
