<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Choice</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #ff2d55;
            --glass: rgba(255, 255, 255, 0.03);
        }

        /* Prevent the "Student" look (Blue boxes, text selection) */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            outline: none !important;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #canvas-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: blur(40px);
            opacity: 0.4;
            transition: opacity 1s ease;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 60px;
            color: rgba(255,255,255,0.5);
            animation: fadeIn 2s ease;
        }

        /* The Slider Track */
        .track {
            position: relative;
            height: 80px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            backdrop-filter: blur(10px);
        }

        .label {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
            pointer-events: none;
        }

        /* The Interactive Orb */
        .orb {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: transform 0.1s linear, box-shadow 0.3s ease;
            z-index: 20;
            position: relative;
        }

        .orb:active { cursor: grabbing; scale: 0.95; }

        .success-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: black;
            animation: reveal 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes reveal { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, var(--bg) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="vignette"></div>
    <div id="canvas-bg"></div>

    <div class="container" id="ui">
        <h1>Initialization of a Choice</h1>
        <div class="track" id="track">
            <div class="label">
                <span>REJECT</span>
                <span>ACCEPT</span>
            </div>
            <div class="orb" id="orb">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="success-overlay" id="finish">
        <h2 style="font-weight: 200; letter-spacing: 8px; text-transform: uppercase;">Connection Established</h2>
        <p style="margin-top: 20px; font-size: 0.9rem; opacity: 0.6;">I'll see you very soon.</p>
    </div>

    <script>
        const orb = document.getElementById('orb');
        const track = document.getElementById('track');
        const ui = document.getElementById('ui');
        const finish = document.getElementById('finish');
        const bg = document.getElementById('canvas-bg');

        let isDragging = false;
        let startX = 0;
        let currentX = 0;

        const onStart = (e) => {
            isDragging = true;
            startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            orb.style.transition = 'none';
        };

        const onMove = (e) => {
            if (!isDragging) return;
            const x = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const delta = x - startX;
            const maxDelta = track.offsetWidth - orb.offsetWidth - 20;

            // Constrain movement
            currentX = Math.max(0, Math.min(delta, maxDelta));
            orb.style.transform = `translateX(${currentX}px)`;

            // Visual feedback - Atmosphere heating up
            const percent = currentX / maxDelta;
            bg.style.background = `radial-gradient(circle, var(--accent) ${percent * 50}%, transparent 70%)`;
            bg.style.opacity = percent;
            
            if (percent > 0.95) {
                complete();
            }
        };

        const onEnd = () => {
            if (!isDragging) return;
            isDragging = false;
            if (currentX / (track.offsetWidth - orb.offsetWidth - 20) < 0.95) {
                orb.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                orb.style.transform = `translateX(0px)`;
                bg.style.opacity = 0;
            }
        };

        const complete = () => {
            isDragging = false;
            ui.style.opacity = '0';
            ui.style.transform = 'scale(0.9)';
            ui.style.transition = 'all 0.5s ease';
            
            setTimeout(() => {
                finish.style.display = 'flex';
            }, 300);
        };

        orb.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);

        orb.addEventListener('touchstart', onStart);
        window.addEventListener('touchmove', onMove);
        window.addEventListener('touchend', onEnd);
    </script>
</body>
</html>
