<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invitation</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --bg-1: #fff0f3;
            --bg-2: #ffccd5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
            overflow: hidden;
            color: #444;
        }

        /* Animated Mesh Gradient Background */
        .mesh {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: blur(80px);
            opacity: 0.6;
        }

        .ball {
            position: absolute;
            border-radius: 50%;
            animation: float 20s infinite alternate;
        }

        .b1 { width: 400px; height: 400px; background: #ffb3c1; top: -10%; left: -10%; }
        .b2 { width: 500px; height: 500px; background: #ff85a1; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 150px); }
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff4d6d, #c9184a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: center;
        }

        button {
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yesBtn {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
            z-index: 100;
        }

        #noBtn {
            background: white;
            color: #888;
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* The Reveal State */
        .celebration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: #fff;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .heart-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="mesh">
        <div class="ball b1"></div>
        <div class="ball b2"></div>
    </div>

    <div class="card" id="mainCard">
        <h1 id="heading">Wait... I have a question</h1>
        <p id="subtext">I've been thinking about this for a while now.</p>
        
        <div class="controls" id="btnGroup">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div class="celebration" id="finalScreen">
        <div class="heart-icon">❤️</div>
        <h1 style="color: #ff4d6d; -webkit-text-fill-color: #ff4d6d;">I knew you'd say yes.</h1>
        <p>See you on the 14th. ✨</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainCard = document.getElementById('mainCard');
        const heading = document.getElementById('heading');
        const subtext = document.getElementById('subtext');
        const finalScreen = document.getElementById('finalScreen');

        let yesScale = 1;
        let noScale = 1;
        
        const messages = [
            "Are you sure?",
            "Really sure??",
            "Think again...",
            "Don't do this to me :(",
            "You're breaking my heart!",
            "I'm gonna cry...",
            "Okay, now you're just being mean!"
        ];
        
        let messageIndex = 0;

        noBtn.addEventListener('click', () => {
            // Update text to be more persuasive
            heading.innerText = messages[messageIndex];
            messageIndex = (messageIndex + 1) % messages.length;
            
            // The "Original Idea": Yes grows, No shrinks
            yesScale += 0.3;
            noScale -= 0.1;
            
            yesBtn.style.transform = `scale(${yesScale})`;
            noBtn.style.transform = `scale(${noScale})`;
            
            // If No becomes too small, it fades out
            if(noScale < 0.4) {
                noBtn.style.opacity = '0';
                noBtn.style.pointerEvents = 'none';
            }
        });

        yesBtn.addEventListener('click', () => {
            mainCard.style.transform = 'scale(0.8)';
            mainCard.style.opacity = '0';
            
            setTimeout(() => {
                mainCard.style.display = 'none';
                finalScreen.style.display = 'flex';
            }, 600);
        });
    </script>
</body>
</html>
